  { q: "Y nazariyasi sharoitida menejer:", options: ["xodimlarga qulay muhit yaratib xodimlarni rag'batlantirib tursa kifoya", "xodimlarga tanbeh berib tursa kifoya", "xodimlarni doimo majburlash, nazorat qilib turish zarur", "xodimlarni doimo majburlash, xodimlarni doimo jazolash, jarima solish bilan qo'rqitib turish zarur"], answer: 0 },
  { q: "Liberal rahbarlar kadrlarni tanlashda:", options: ["beparvolarcha yondashadilar", "kuchli raqobatdoshlardan qutulish payida bo'ladilar", "ishchan, bilimdon xodimlarga mo'ljal oladilar, ularni o'sishiga yordam beradilar", "tashqaridan madad kutadi"], answer: 0 },
  { q: "Firmaning qaysi boshqaruv darajasi barcha bo'linmalar faoliyatiga muvofiqligi holda firmaning samarali ishlashi va rivojlanishi ta'minlanishini amalga oshiradi?", options: ["boshqaruvning oliy darajasi-Top management", "boshqaruvning o'rtacha darajasi-Middle management", "boshqaruvning quyi darajasi-Lower management", "boshqaruvning marketologi"], answer: 0 },
  { q: "Yuqori pog'onadagi menejerlar:", options: ["firma istiqbolini belgilash uning kelajagi uchun ahamiyatli chora tadbirlarni ishlab chiqish bilan shug'ullanadi", "firma faoliyatining ayrim tomonlarini, ishlab chiqarish, mehnatni tashkil etish kabilarni boshqarish bilan shug'ullanadi", "tsex bo'lim brigada doirasida ishni tashkil etish, kunlik, haftalik, oylik ish topshiriqlarining bajarilishini boshqarib boradi", "moliya faoliyati yangi tovarlarni o'zlashtirish texnologiyani qo'llash mehnatni tashkil etish kabilarni boshqarish bilan shug'ullanadi"], answer: 0 },
  { q: "Boshqaruv uslubi…", options: ["bu boshqaruv jarayonida kelib chiqadigan muammolarni hal qilish usullari, yo'llari majmuasidir", "bu boshqaruvning tarkibiy tuzilmasi", "bu boshqaruv funksiyalarini samarali bajarish, boshqaruv jarayonida kelib chiqadigan nizolarni hal qilish usullari, yo'llari majmuasidir", "bu boshqaruv funksiyalarini samarali bajarish"], answer: 0 },
];

const TOTAL = rawQuestions.length;

const state = {
  phase: 'menu',
  fromQ: 1, toQ: Math.min(20, TOTAL),
  questions: [], current: 0,
  selected: null, confirmed: false,
  score: 0, wrong: [],
  timerOn: false, timeLeft: null, timerInterval: null
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function shuffleOptions(question) {
  const indexed = question.options.map((opt, i) => ({ opt, isAnswer: i === question.answer }));
  const shuffled = shuffle(indexed);
  const newAnswer = shuffled.findIndex(item => item.isAnswer);
  return { ...question, options: shuffled.map(item => item.opt), answer: newAnswer };
}

function startTimer() {
  state.timeLeft = 30;
  clearInterval(state.timerInterval);
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    if (state.timeLeft <= 0) { clearInterval(state.timerInterval); confirmAnswer(true); }
    else renderQuiz();
  }, 1000);
}
function stopTimer() { clearInterval(state.timerInterval); state.timerInterval = null; }

function renderMenu() {
  const from = state.fromQ, to = state.toQ;
  const valid = from >= 1 && to <= TOTAL && from < to;
  const count = valid ? to - from + 1 : 0;
  const quickSets = [[1,20],[21,40],[41,60],[61,80],[81,TOTAL]];
  document.getElementById('app').innerHTML = `
    <div class="card">
      <h1>📘 Menejment Quiz</h1>
      <p class="subtitle">Jami ${TOTAL} ta savol — istalgan oraliqni tanlang</p>
      <br>
      <label class="section-label">Tezkor tanlov:</label>
      <div class="quick-row">
        ${quickSets.filter(([f,t])=>t<=TOTAL).map(([f,t])=>`<button class="quick-btn" onclick="setRange(${f},${t})">${f}–${t}</button>`).join('')}
        <button class="quick-btn" onclick="setRange(1,${TOTAL})">Hammasi</button>
      </div>
      <label class="section-label">Yoki o'zingiz kiriting:</label>
      <div class="range-row">
        <input class="range-input" type="number" id="fromInput" value="${from}" min="1" max="${TOTAL}" oninput="updateRange()">
        <span class="range-sep">dan</span>
        <input class="range-input" type="number" id="toInput" value="${to}" min="1" max="${TOTAL}" oninput="updateRange()">
        <span class="range-sep">gacha</span>
      </div>
      ${valid ? `<p class="range-info">✅ ${count} ta savol tanlanadi</p>` : `<p class="err">❌ Noto'g'ri oraliq</p>`}
      <div class="toggle-row" style="margin-top:20px">
        <div class="toggle ${state.timerOn?'on':''}" onclick="toggleTimer()"><div class="toggle-dot"></div></div>
        <span class="toggle-label">Taymer (har savol 30 soniya)</span>
      </div>
      <button class="btn-primary" ${valid?'':'disabled'} onclick="startQuiz()">🚀 Testni boshlash</button>
    </div>`;
}

function setRange(f, t) { state.fromQ = f; state.toQ = t; renderMenu(); }
function updateRange() {
  const f = parseInt(document.getElementById('fromInput').value);
  const t = parseInt(document.getElementById('toInput').value);
  if (!isNaN(f)) state.fromQ = f;
  if (!isNaN(t)) state.toQ = t;
  renderMenu();
}
function toggleTimer() { state.timerOn = !state.timerOn; renderMenu(); }

function startQuiz() {
  const from = state.fromQ - 1;
  const to = state.toQ;
  if (from < 0 || to > TOTAL || from >= to) return;
  stopTimer();
  // Shuffle both question order AND options
  const selected = rawQuestions.slice(from, to);
  state.questions = shuffle(selected).map(shuffleOptions);
  state.current = 0; state.selected = null; state.confirmed = false;
  state.score = 0; state.wrong = []; state.phase = 'quiz';
  if (state.timerOn) startTimer();
  renderQuiz();
}

function renderQuiz() {
  const q = state.questions[state.current];
  const progress = (state.current / state.questions.length) * 100;
  const letters = ['A','B','C','D'];
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="header-row">
        <span class="header-left">Savol ${state.current+1} / ${state.questions.length}</span>
        <div class="header-right">
          <span class="score-badge">✅ ${state.score}</span>
          ${state.timerOn && state.timeLeft!==null ? `<span class="timer-badge ${state.timeLeft<=10?'timer-urgent':'timer-ok'}">⏱ ${state.timeLeft}s</span>` : ''}
        </div>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar" style="width:${progress}%"></div></div>
      <div class="question-box"><p class="question-text">${q.q}</p></div>
      <div class="options">
        ${q.options.map((opt,i) => {
          let cls='option', letter=letters[i]+'.';
          if (state.confirmed) {
            if (i===q.answer) { cls+=' correct'; letter='✅'; }
            else if (i===state.selected && state.selected!==q.answer) { cls+=' wrong'; letter='❌'; }
          } else if (state.selected===i) cls+=' selected';
          return `<div class="${cls}" onclick="selectOption(${i})"><span class="opt-letter">${letter}</span>${opt}</div>`;
        }).join('')}
      </div>
      ${!state.confirmed
        ? `<button class="btn-check ${state.selected!==null?'active':'disabled'}" onclick="confirmAnswer(false)">Tekshirish</button>`
        : `<button class="btn-next" onclick="nextQuestion()">${state.current+1>=state.questions.length?"Natijani ko'rish 🏁":"Keyingi savol →"}</button>`
      }
    </div>`;
}

function renderResult() {
  const pct = Math.round((state.score / state.questions.length) * 100);
  const emoji = pct>=90?'🏆':pct>=70?'👍':pct>=50?'😅':'💪';
  const msg = pct>=90?"A'lo! Siz tayyor!":pct>=70?"Yaxshi! Biroz yana o'qing.":pct>=50?"O'rtacha. Ko'proq mashq kerak.":"Yana o'qib chiqing!";
  const scoreColor = pct>=70?'#4ade80':pct>=50?'#fbbf24':'#f87171';
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="text-center mb24">
        <span class="emoji-big">${emoji}</span>
        <h2>${msg}</h2>
        <div class="score-big" style="color:${scoreColor}">${pct}%</div>
        <p class="score-sub">${state.score} / ${state.questions.length} to'g'ri javob</p>
      </div>
      ${state.wrong.length>0 ? `
        <div class="mb24">
          <p class="wrong-title">❌ Xato javoblar (${state.wrong.length} ta):</p>
          <div class="wrong-list">
            ${state.wrong.map(w=>`
              <div class="wrong-item">
                <p class="wrong-q">${w.q}</p>
                <p class="wrong-yours">❌ Siz: ${w.options[w.selected]??'Javob berilmadi'}</p>
                <p class="wrong-correct">✅ To'g'ri: ${w.options[w.answer]}</p>
              </div>`).join('')}
          </div>
        </div>` : ''}
      <div class="result-btn-row">
        <button class="btn-secondary" onclick="goMenu()">🏠 Menyu</button>
        <button class="btn-next" onclick="startQuiz()">🔄 Qayta</button>
      </div>
    </div>`;
}

function selectOption(i) { if (state.confirmed) return; state.selected=i; renderQuiz(); }
function confirmAnswer(timeout) {
  if ((state.selected===null && !timeout) || state.confirmed) return;
  state.confirmed=true; stopTimer();
  const q=state.questions[state.current];
  if (state.selected===q.answer) state.score++;
  else state.wrong.push({q:q.q, options:q.options, answer:q.answer, selected:state.selected});
  renderQuiz();
}
function nextQuestion() {
  if (state.current+1>=state.questions.length) { state.phase='result'; renderResult(); }
  else { state.current++; state.selected=null; state.confirmed=false; if (state.timerOn) startTimer(); renderQuiz(); }
}
function goMenu() { stopTimer(); state.phase='menu'; renderMenu(); }
renderMenu();
</script>
