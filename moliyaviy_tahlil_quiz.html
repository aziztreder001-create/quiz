function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

let state = {
  phase: 'menu', questions: [], current: 0, selected: null,
  confirmed: false, score: 0, wrong: [], count: 20,
  timerOn: false, timeLeft: null, timerInterval: null
};

function prepareQuestions(count) {
  return shuffle(rawQuestions).slice(0, Math.min(count, rawQuestions.length)).map(q => {
    const correct = q.options[q.answer];
    const shuffled = shuffle([...q.options]);
    return { q: q.q, options: shuffled, answer: shuffled.indexOf(correct) };
  });
}

function startTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timeLeft = 30;
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    if (state.timeLeft <= 0) { clearInterval(state.timerInterval); if (!state.confirmed) confirmAnswer(true); }
    else renderQuiz();
  }, 1000);
}

function stopTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = null; state.timeLeft = null;
}

function render() {
  if (state.phase === 'menu') renderMenu();
  else if (state.phase === 'quiz') renderQuiz();
  else renderResult();
}

function renderMenu() {
  const counts = [10, 20, 30, 50, 100, rawQuestions.length];
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="text-center mb24">
        <span class="emoji-big">📊</span>
        <h1>Moliyaviy Tahlil</h1>
        <p class="subtitle">Imtihon tayyor? Keling test qilaylik!</p>
        <p class="count-info">Jami ${rawQuestions.length} ta savol mavjud</p>
      </div>
      <label class="section-label">Savollar soni:</label>
      <div class="btn-row">
        ${counts.map(n => `<button class="count-btn ${state.count===n?'active':''}" onclick="setCount(${n})">${n===rawQuestions.length?'Barchasi':n}</button>`).join('')}
      </div>
      <div class="toggle-row mb28">
        <div class="toggle ${state.timerOn?'on':''}" onclick="toggleTimer()"><div class="toggle-dot"></div></div>
        <span class="toggle-label">Taymer (har savol 30 soniya)</span>
      </div>
      <button class="btn-primary" onclick="startQuiz()">🚀 Testni boshlash</button>
    </div>`;
}

function renderQuiz() {
  const q = state.questions[state.current];
  const progress = (state.current / state.questions.length) * 100;
  const letters = ['A','B','C','D'];
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="header-row">
        <span class="header-left">Savol ${state.current+1} / ${state.questions.length}</span>
        <div class="header-right">
          <span class="score-badge">✅ ${state.score}</span>
          ${state.timerOn && state.timeLeft!==null ? `<span class="timer-badge ${state.timeLeft<=10?'timer-urgent':'timer-ok'}">⏱ ${state.timeLeft}s</span>` : ''}
        </div>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar" style="width:${progress}%"></div></div>
      <div class="question-box"><p class="question-text">${q.q}</p></div>
      <div class="options">
        ${q.options.map((opt,i) => {
          let cls='option', letter=letters[i]+'.';
          if (state.confirmed) {
            if (i===q.answer) { cls+=' correct'; letter='✅'; }
            else if (i===state.selected && state.selected!==q.answer) { cls+=' wrong'; letter='❌'; }
          } else if (state.selected===i) cls+=' selected';
          return `<div class="${cls}" onclick="selectOption(${i})"><span class="opt-letter">${letter}</span>${opt}</div>`;
        }).join('')}
      </div>
      ${!state.confirmed
        ? `<button class="btn-check ${state.selected!==null?'active':'disabled'}" onclick="confirmAnswer(false)">Tekshirish</button>`
        : `<button class="btn-next" onclick="nextQuestion()">${state.current+1>=state.questions.length?"Natijani ko'rish 🏁":"Keyingi savol →"}</button>`
      }
    </div>`;
}

function renderResult() {
  const pct = Math.round((state.score / state.questions.length) * 100);
  const emoji = pct>=90?'🏆':pct>=70?'👍':pct>=50?'😅':'💪';
  const msg = pct>=90?"A'lo! Siz tayyor!":pct>=70?"Yaxshi! Biroz yana o'qing.":pct>=50?"O'rtacha. Ko'proq mashq kerak.":"Yana o'qib chiqing!";
  const scoreColor = pct>=70?'#4ade80':pct>=50?'#fbbf24':'#f87171';
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="text-center mb24">
        <span class="emoji-big">${emoji}</span>
        <h2>${msg}</h2>
        <div class="score-big" style="color:${scoreColor}">${pct}%</div>
        <p class="score-sub">${state.score} / ${state.questions.length} to'g'ri javob</p>
      </div>
      ${state.wrong.length>0 ? `
        <div class="mb24">
          <p class="wrong-title">❌ Xato javoblar (${state.wrong.length} ta):</p>
          <div class="wrong-list">
            ${state.wrong.map(w=>`
              <div class="wrong-item">
                <p class="wrong-q">${w.q}</p>
                <p class="wrong-yours">❌ Siz: ${w.options[w.selected]??'Javob berilmadi'}</p>
                <p class="wrong-correct">✅ To'g'ri: ${w.options[w.answer]}</p>
              </div>`).join('')}
          </div>
        </div>` : ''}
      <div class="result-btn-row">
        <button class="btn-secondary" onclick="goMenu()">🏠 Menyu</button>
        <button class="btn-next" onclick="startQuiz()">🔄 Qayta</button>
      </div>
    </div>`;
}

function setCount(n) { state.count=n; renderMenu(); }
function toggleTimer() { state.timerOn=!state.timerOn; renderMenu(); }
function startQuiz() {
  stopTimer();
  state.questions=prepareQuestions(state.count);
  state.current=0; state.selected=null; state.confirmed=false;
  state.score=0; state.wrong=[]; state.phase='quiz';
  if (state.timerOn) startTimer();
  renderQuiz();
}
function selectOption(i) { if (state.confirmed) return; state.selected=i; renderQuiz(); }
function confirmAnswer(timeout) {
  if ((state.selected===null && !timeout) || state.confirmed) return;
  state.confirmed=true; stopTimer();
  const q=state.questions[state.current];
  if (state.selected===q.answer) state.score++;
  else state.wrong.push({q:q.q, options:q.options, answer:q.answer, selected:state.selected});
  renderQuiz();
}
function nextQuestion() {
  if (state.current+1>=state.questions.length) { state.phase='result'; renderResult(); }
  else { state.current++; state.selected=null; state.confirmed=false; if (state.timerOn) startTimer(); renderQuiz(); }
}
function goMenu() { stopTimer(); state.phase='menu'; renderMenu(); }
render();
</script>
